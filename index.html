<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Bubble Risk Monitor</title>
<style>
:root {
  --bg: #0a0a0f; --card: #12121a; --card-hover: #1a1a28;
  --border: #1e1e2e; --border-hover: #2a2a3e;
  --text: #e4e4ef; --text-muted: #8888a0; --text-dim: #555570;
  --accent: #7c5cfc; --danger: #ff4757; --warning: #ffa502;
  --success: #2ed573; --info: #3b82f6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border-hover); border-radius:3px; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.disclaimer-banner { background:linear-gradient(135deg,#1a1520,#181420); border:1px solid #2a2040; border-radius:12px; padding:14px 20px; margin-bottom:24px; display:flex; align-items:flex-start; gap:12px; font-size:12px; color:var(--text-muted); line-height:1.6; }
.disclaimer-banner svg { flex-shrink:0; margin-top:2px; }
.disclaimer-banner strong { color:var(--warning); }
.disclaimer-banner a { color:var(--accent); text-decoration:underline; cursor:pointer; }
.disclaimer-full { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:32px; margin-top:28px; margin-bottom:0; }
.disclaimer-full h3 { font-size:15px; font-weight:700; color:var(--warning); margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.disclaimer-full p { font-size:12px; color:var(--text-muted); line-height:1.8; margin-bottom:12px; }
.disclaimer-full p:last-child { margin-bottom:0; }
.disclaimer-full strong { color:var(--text); font-weight:600; }
.dashboard { padding:24px 32px; min-height:100vh; max-width:1400px; margin:0 auto; }
.header { margin-bottom:32px; }
.header h1 { font-size:28px; font-weight:800; background:linear-gradient(135deg,var(--text),var(--warning)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; display:inline; }
.header-row { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
.subtitle { font-size:14px; color:var(--text-muted); max-width:750px; line-height:1.6; }

.tabs { display:flex; gap:4px; margin-bottom:28px; background:var(--card); padding:4px; border-radius:12px; width:fit-content; border:1px solid var(--border); }
.tab { padding:10px 20px; border-radius:8px; border:none; cursor:pointer; font-size:13px; font-weight:600; background:transparent; color:var(--text-muted); transition:all 0.2s; }
.tab.active { background:var(--accent); color:#fff; }
.tab:hover:not(.active) { background:var(--card-hover); }

.grid-3 { display:grid; grid-template-columns:340px 1fr 1fr; gap:20px; margin-bottom:28px; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:28px; }
.card { background:var(--card); border-radius:16px; border:1px solid var(--border); padding:24px; animation:fadeIn 0.3s ease; }
.card-title { font-size:13px; font-weight:700; margin-bottom:4px; }
.card-sub { font-size:11px; color:var(--text-muted); margin-bottom:16px; }

.gauge-card { display:flex; flex-direction:column; align-items:center; padding:28px 24px; }
.gauge-label { font-size:11px; font-weight:700; color:var(--text-muted); letter-spacing:2px; margin-bottom:8px; }
.gauge-wrap { position:relative; width:220px; height:220px; }
.gauge-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
.gauge-score { font-size:48px; font-weight:800; font-family:monospace; line-height:1; }
.gauge-risk { font-size:11px; font-weight:700; letter-spacing:3px; margin-top:4px; }
.gauge-max { font-size:10px; color:var(--text-muted); margin-top:2px; }
.gauge-note { margin-top:12px; padding:8px 16px; border-radius:8px; font-size:12px; font-weight:600; max-width:280px; text-align:center; line-height:1.5; }

.cat-card { background:var(--card); border-radius:16px; border:1px solid var(--border); overflow:hidden; animation:fadeIn 0.3s ease; margin-bottom:12px; }
.cat-header { padding:20px 24px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; transition:background 0.2s; }
.cat-header:hover { background:var(--card-hover); }
.cat-left { display:flex; align-items:center; gap:16px; flex:1; }
.cat-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; }
.cat-name { font-size:16px; font-weight:700; }
.cat-weight { font-size:11px; color:var(--text-muted); background:var(--border); padding:2px 8px; border-radius:6px; margin-left:10px; }
.cat-desc { font-size:12px; color:var(--text-muted); max-width:500px; margin-top:4px; }
.cat-score { font-size:28px; font-weight:800; font-family:monospace; text-align:right; }
.cat-score-label { font-size:10px; color:var(--text-muted); letter-spacing:1px; text-align:right; }
.cat-body { padding:0 24px 24px; }
.cat-divider { height:1px; background:var(--border); margin-bottom:12px; }

/* REDESIGNED Indicator cards */
.ind-card { background:rgba(10,10,15,0.5); border-radius:12px; border:1px solid var(--border); overflow:hidden; margin-bottom:10px; }
.ind-top { padding:18px 20px; cursor:pointer; display:flex; align-items:center; gap:16px; transition:background 0.2s; }
.ind-top:hover { background:rgba(26,26,40,0.5); }
.ind-top-score { min-width:48px; text-align:center; }
.ind-top-num { font-size:22px; font-weight:800; font-family:monospace; }
.ind-top-of { font-size:9px; color:var(--text-dim); }
.ind-vbar { width:2px; height:40px; border-radius:1px; opacity:0.5; }
.ind-top-info { flex:1; min-width:0; }
.ind-top-name { font-size:14px; font-weight:600; margin-bottom:2px; }
.ind-top-measure { font-size:12px; color:var(--text-muted); line-height:1.4; }
.ind-top-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.ind-top-raw { text-align:right; }
.ind-top-raw-val { font-size:15px; font-weight:700; color:var(--text); }
.ind-top-raw-unit { font-size:10px; color:var(--text-dim); }
.chev { transition:transform 0.2s; display:inline-block; }
.chev.open { transform:rotate(180deg); }

/* Expanded detail */
.ind-detail { border-top:1px solid var(--border); padding:18px 20px; animation:fadeIn 0.2s ease; }
.ind-meter { margin:12px 0 16px; }
.ind-meter-bar { height:8px; background:var(--border); border-radius:4px; position:relative; overflow:visible; }
.ind-meter-fill { height:100%; border-radius:4px; transition:width 0.6s ease; }
.ind-meter-labels { display:flex; justify-content:space-between; margin-top:6px; font-size:10px; color:var(--text-dim); }
.ind-meter-markers { position:relative; height:20px; margin-top:2px; }
.ind-meter-mark { position:absolute; transform:translateX(-50%); text-align:center; }
.ind-meter-mark-line { width:1px; height:8px; margin:0 auto; }
.ind-meter-mark-label { font-size:9px; white-space:nowrap; margin-top:2px; }

.ind-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:14px; }
.ind-stat { padding:10px 12px; border-radius:8px; background:rgba(10,10,15,0.6); border:1px solid var(--border); }
.ind-stat-label { font-size:9px; font-weight:700; letter-spacing:0.8px; color:var(--text-dim); margin-bottom:4px; text-transform:uppercase; }
.ind-stat-val { font-size:16px; font-weight:700; font-family:monospace; }
.ind-stat-note { font-size:10px; color:var(--text-dim); margin-top:2px; }

.ind-explain { margin-top:14px; }
.ind-explain-title { font-size:10px; font-weight:700; letter-spacing:1px; margin-bottom:6px; }
.ind-explain-text { font-size:12px; color:var(--text-muted); line-height:1.6; }
.ind-explain-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:12px; }
.ind-source { margin-top:12px; font-size:11px; color:var(--text-dim); }

/* Rankings */
.rank-row { display:flex; align-items:center; gap:12px; padding:8px 0; }
.rank-row + .rank-row { border-top:1px solid var(--border); }
.rank-score { font-size:18px; font-weight:800; font-family:monospace; width:36px; text-align:center; }
.rank-info { flex:1; }
.rank-name { font-size:13px; font-weight:600; }
.rank-cat { font-size:11px; }

/* Weight */
.weight-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.weight-box { padding:14px 16px; border-radius:10px; }
.weight-dot { width:10px; height:10px; border-radius:3px; display:inline-block; margin-right:8px; }

/* Methodology */
.meth { max-width:800px; }
.meth h2 { font-size:20px; font-weight:800; margin-bottom:16px; }
.meth h3 { font-size:16px; font-weight:700; margin:24px 0 12px; }
.meth p { font-size:14px; color:var(--text-muted); line-height:1.8; margin-bottom:16px; }
.meth-item { padding:14px 18px; background:rgba(10,10,15,0.5); border-radius:10px; border:1px solid var(--border); margin-bottom:10px; }
.threshold-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.threshold { padding:14px; border-radius:10px; text-align:center; }

.chart-svg { display:block; width:100%; }
.callout { margin-top:12px; padding:10px 14px; border-radius:8px; font-size:11px; line-height:1.6; }
.footer { margin-top:40px; padding-top:20px; border-top:1px solid var(--border); display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); }
.expand-btn { padding:6px 14px; background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text-muted); font-size:12px; cursor:pointer; }
.expand-btn:hover { background:var(--card-hover); }
.flex-col-gap { display:flex; flex-direction:column; gap:20px; }

/* Tooltip system */
.tip-wrap { position:relative; }
.tip-trigger { cursor:help; }
#tooltip {
  position:fixed; z-index:9999; pointer-events:none;
  max-width:320px; padding:12px 16px;
  background:rgba(22,22,35,0.97); border:1px solid var(--border-hover);
  border-radius:10px; box-shadow:0 8px 32px rgba(0,0,0,0.5);
  opacity:0; transform:translateY(6px);
  transition:opacity 0.15s ease, transform 0.15s ease;
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
}
#tooltip.visible { opacity:1; transform:translateY(0); }
#tooltip .tip-title { font-size:12px; font-weight:700; color:var(--accent); margin-bottom:6px; }
#tooltip .tip-body { font-size:12px; color:var(--text-muted); line-height:1.6; }
#tooltip .tip-body strong { color:var(--text); font-weight:600; }

/* Hover highlight on cards */
.has-tip { transition:border-color 0.2s; }
.has-tip:hover { border-color:var(--border-hover) !important; }

@media (max-width:1100px) {
  .grid-3 { grid-template-columns:1fr; }
  .grid-2 { grid-template-columns:1fr; }
  .weight-grid { grid-template-columns:1fr 1fr; }
  .threshold-grid { grid-template-columns:1fr 1fr; }
  .ind-grid-3 { grid-template-columns:1fr; }
  .ind-explain-grid { grid-template-columns:1fr; }
}
</style>

// ─── TOOLTIP SYSTEM (data-key based, no inline string escaping issues) ───
const TIPDB = {}; // tooltip registry: key -> {title, body}
let tipCounter = 0;

function registerTip(title, body) {
  const key = 'tip_' + (tipCounter++);
  TIPDB[key] = {title, body};
  return key;
}

function showTipByKey(evt, key) {
  const data = TIPDB[key];
  if (!data) return;
  const t = document.getElementById('tooltip');
  t.querySelector('.tip-title').textContent = data.title;
  t.querySelector('.tip-body').innerHTML = data.body;
  const rect = evt.currentTarget.getBoundingClientRect();
  let x = rect.left + rect.width/2;
  let y = rect.bottom + 10;
  t.style.left = '0px'; t.style.top = '0px';
  t.classList.add('visible');
  const tw = t.offsetWidth, th = t.offsetHeight;
  if (x + tw/2 > window.innerWidth - 16) x = window.innerWidth - tw - 16;
  if (x - tw/2 < 16) x = 16; else x -= tw/2;
  if (y + th > window.innerHeight - 16) y = rect.top - th - 10;
  t.style.left = x + 'px';
  t.style.top = y + 'px';
}
function hideTip() {
  document.getElementById('tooltip').classList.remove('visible');
}
// Returns HTML attributes for a tooltip, using a registered key
function tip(title, body) {
  const key = registerTip(title, body);
  return `onmouseenter="showTipByKey(event,'${key}')" onmouseleave="hideTip()"`;
}

// ─── HELPERS ───
function riskColor(s){return s>=80?"#ff4757":s>=60?"#ffa502":s>=40?"#f59e0b":"#2ed573";}
function riskLabel(s){return s>=85?"EXTREME":s>=70?"HIGH":s>=55?"ELEVATED":s>=40?"MODERATE":"LOW";}
function catAvg(cat){return Math.round(cat.indicators.reduce((a,i)=>a+i.score,0)/cat.indicators.length);}
function compositeScore(){let ws=0,tw=0;CATEGORIES.forEach(c=>{ws+=catAvg(c)*c.weight;tw+=c.weight;});return Math.round(ws/tw);}

// ─── SVG CHARTS ───
function sparkSVG(data,color,w,h){w=w||80;h=h||28;const mx=Math.max(...data),mn=Math.min(...data),rng=mx-mn||1;const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*(h-4)-2}`).join(" ");const id="s"+Math.random().toString(36).substr(2,5);return `<svg width="${w}" height="${h}" style="display:block"><defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.3"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><polyline fill="none" stroke="${color}" stroke-width="1.5" points="${pts}"/><polygon fill="url(#${id})" points="0,${h} ${pts} ${w},${h}"/></svg>`;}

function areaSVG(data,lk,vk,color,w,h){w=w||400;h=h||180;const vals=data.map(d=>d[vk]),mx=Math.max(...vals);const pL=35,pR=10,pT=10,pB=28,cw=w-pL-pR,ch=h-pT-pB;const pts=vals.map((v,i)=>`${pL+(i/(vals.length-1))*cw},${pT+ch-(v/mx)*ch}`);const id="a"+Math.random().toString(36).substr(2,5);let s="";for(let i=0;i<=4;i++){const y=pT+(i/4)*ch;s+=`<line x1="${pL}" y1="${y}" x2="${w-pR}" y2="${y}" stroke="#1e1e2e" stroke-dasharray="3 3"/><text x="${pL-6}" y="${y+3}" text-anchor="end" fill="#555570" font-size="9">${Math.round(mx-(i/4)*mx)}</text>`;}data.forEach((d,i)=>{s+=`<text x="${pL+(i/(data.length-1))*cw}" y="${h-4}" text-anchor="middle" fill="#555570" font-size="9">${d[lk]}</text>`;});s+=`<polygon fill="url(#${id})" points="${pL},${pT+ch} ${pts.join(" ")} ${pL+cw},${pT+ch}"/><polyline fill="none" stroke="${color}" stroke-width="2" points="${pts.join(" ")}"/>`;pts.forEach(p=>{const[x,y]=p.split(",");s+=`<circle cx="${x}" cy="${y}" r="3" fill="${color}"/>`;});return `<svg viewBox="0 0 ${w} ${h}" class="chart-svg"><defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.25"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>${s}</svg>`;}

function barSVG(data,w,h){w=w||400;h=h||200;const pL=140,pR=20,pT=10,pB=10,cw=w-pL-pR,ch=h-pT-pB;const bH=Math.min(22,(ch/data.length)-8);let s="";data.forEach((d,i)=>{const y=pT+i*(ch/data.length)+(ch/data.length-bH)/2,bw=(d.score/100)*cw;s+=`<rect x="${pL}" y="${y}" width="${bw}" height="${bH}" rx="4" fill="${d.color}" fill-opacity="0.8"/><text x="${pL-8}" y="${y+bH/2+4}" text-anchor="end" fill="#8888a0" font-size="11">${d.name}</text><text x="${pL+bw+6}" y="${y+bH/2+4}" fill="#8888a0" font-size="10">${d.score}</text>`;});for(let i=0;i<=4;i++){const x=pL+(i/4)*cw;s+=`<line x1="${x}" y1="${pT}" x2="${x}" y2="${h-pB}" stroke="#1e1e2e" stroke-dasharray="2 2"/><text x="${x}" y="${h}" text-anchor="middle" fill="#555570" font-size="9">${i*25}</text>`;}return `<svg viewBox="0 0 ${w} ${h}" class="chart-svg">${s}</svg>`;}

function dotcomSVG(data,w,h){w=w||400;h=h||200;const pL=35,pR=10,pT=15,pB=36,cw=w-pL-pR,ch=h-pT-pB;function xy(i,v){return{x:pL+(i/(data.length-1))*cw,y:pT+ch-(v/100)*ch};}let s="";for(let i=0;i<=4;i++){const y=pT+(i/4)*ch;s+=`<line x1="${pL}" y1="${y}" x2="${w-pR}" y2="${y}" stroke="#1e1e2e" stroke-dasharray="3 3"/><text x="${pL-6}" y="${y+3}" text-anchor="end" fill="#555570" font-size="9">${100-i*25}</text>`;}data.forEach((d,i)=>{s+=`<text x="${pL+(i/(data.length-1))*cw}" y="${h-10}" text-anchor="middle" fill="#555570" font-size="9">${d.y}</text>`;});let dc=data.filter(d=>d.dc!=null).map(d=>{const p=xy(data.indexOf(d),d.dc);return`${p.x},${p.y}`;});s+=`<polyline fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="6 3" points="${dc.join(" ")}"/>`;data.filter(d=>d.dc!=null).forEach(d=>{const p=xy(data.indexOf(d),d.dc);s+=`<circle cx="${p.x}" cy="${p.y}" r="3" fill="#f97316"/>`;});let ai=data.filter(d=>d.ai!=null).map(d=>{const p=xy(data.indexOf(d),d.ai);return`${p.x},${p.y}`;});s+=`<polyline fill="none" stroke="#7c5cfc" stroke-width="2.5" points="${ai.join(" ")}"/>`;data.filter(d=>d.ai!=null).forEach(d=>{const p=xy(data.indexOf(d),d.ai);s+=`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#7c5cfc"/>`;});s+=`<rect x="${pL}" y="${h-4}" width="16" height="2" fill="#f97316" rx="1"/><text x="${pL+20}" y="${h}" fill="#8888a0" font-size="9">Dot-Com (2000)</text><rect x="${pL+120}" y="${h-4}" width="16" height="2" fill="#7c5cfc" rx="1"/><text x="${pL+140}" y="${h}" fill="#8888a0" font-size="9">AI Bubble (Now)</text>`;return `<svg viewBox="0 0 ${w} ${h}" class="chart-svg">${s}</svg>`;}

function gaugeSVG(score){const color=riskColor(score),r=80,circ=2*Math.PI*r,dash=circ*(score/100)*0.75,track=circ*0.75;return `<svg viewBox="0 0 200 200" width="220" height="220" style="transform:rotate(135deg)"><circle cx="100" cy="100" r="${r}" fill="none" stroke="#1e1e2e" stroke-width="12" stroke-dasharray="${track} ${circ-track}" stroke-linecap="round"/><circle cx="100" cy="100" r="${r}" fill="none" stroke="${color}" stroke-width="12" stroke-dasharray="${dash} ${circ-dash}" stroke-linecap="round" style="filter:drop-shadow(0 0 8px ${color});transition:stroke-dasharray 1s ease"/></svg>`;}

function pieSVG(data,sz){sz=sz||160;const cx=sz/2,cy=sz/2,r=55,ir=35;let sa=-90,s="";const t=data.reduce((a,d)=>a+d.weight,0);data.forEach(d=>{const an=(d.weight/t)*360,g=3,a1=(sa+g/2)*Math.PI/180,a2=(sa+an-g/2)*Math.PI/180,lg=an-g>180?1:0;s+=`<path d="M${cx+r*Math.cos(a1)},${cy+r*Math.sin(a1)} A${r},${r} 0 ${lg} 1 ${cx+r*Math.cos(a2)},${cy+r*Math.sin(a2)} L${cx+ir*Math.cos(a2)},${cy+ir*Math.sin(a2)} A${ir},${ir} 0 ${lg} 0 ${cx+ir*Math.cos(a1)},${cy+ir*Math.sin(a1)} Z" fill="${d.color}"/>`;sa+=an;});return `<svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}">${s}</svg>`;}

// Meter bar for indicator detail
function meterSVG(score, baseline, caution, crisis, color) {
  const w=100;
  return `<div class="ind-meter">
    <div class="ind-meter-bar"><div class="ind-meter-fill" style="width:${score}%;background:${riskColor(score)};box-shadow:0 0 8px ${riskColor(score)}40"></div></div>
    <div class="ind-meter-labels"><span>0 \u2014 No risk</span><span>50 \u2014 Caution</span><span>100 \u2014 Peak bubble</span></div>
  </div>`;
}

let activeTab="overview", expandedCats=new Set(["reality"]), expandedInds=new Set();

function render(){

  H+=`<div class="disclaimer-banner"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffa502" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><div><strong>For educational and entertainment purposes only.</strong> This dashboard does not constitute financial, investment, legal, or professional advice. Do not make any financial decisions based on the information presented here. <a onclick="setTab('disclaimer');window.scrollTo(0,document.body.scrollHeight)">Read full disclaimer \u2192</a></div></div>`;
  H+=`<div class="tabs"><button class="tab ${activeTab==="overview"?"active":""}" onclick="setTab('overview')">Overview</button><button class="tab ${activeTab==="indicators"?"active":""}" onclick="setTab('indicators')">All Indicators</button><button class="tab ${activeTab==="backtesting"?"active":""}" onclick="setTab('backtesting')">Backtesting</button><button class="tab ${activeTab==="methodology"?"active":""}" onclick="setTab('methodology')">Methodology</button><button class="tab ${activeTab==="disclaimer"?"active":""}" onclick="setTab('disclaimer')">Disclaimer</button></div>`;

  if(activeTab==="overview"){
    // Tooltip definitions for overview elements
    const TIPS = {
      gauge: {t:"Composite Risk Score", b:"<strong>The big number.</strong> This is the weighted average of all 22 indicators across 5 categories. Think of it like a thermometer for AI hype. 0 = no bubble risk, 100 = we are at dot-com peak levels. Scores above 70 have historically preceded market corrections within 6-18 months."},
      gaugeNum: {t:"What does "+cs+" mean?",b:"The score is "+cs+" out of 100. That puts us in the <strong>"+riskLabel(cs)+"</strong> zone. Each point comes from real data: earnings calls, VC funding ratios, GPU prices, enterprise ROI surveys, and more. Click the 'All Indicators' tab to see how each data point contributes."},
      catBreak: {t:"Category Breakdown", b:"<strong>The 5 types of risk we track.</strong> Rather than one big number, we split bubble risk into 5 categories: how people are behaving (Froth), how money is flowing (Financial), what the infrastructure can handle (Strain), whether AI is delivering results (Reality Gap), and outside forces (Regulatory). Each bar shows that category's average risk score."},
      timeline: {t:"Risk Score Over Time", b:"<strong>Is the risk growing or shrinking?</strong> This shows the composite score month by month since January 2024. A rising line means more indicators are flashing hotter. The trajectory matters as much as the current number \u2014 a steady climb from 38 to 76 in two years suggests accelerating risk."},
      dotcom: {t:"Dot-Com Comparison", b:"<strong>Are we repeating history?</strong> The dashed orange line shows how the dot-com bubble's risk score evolved from 3 years before its peak (March 2000) through the crash. The purple line is AI right now. They're overlaid so you can see if the AI bubble is tracking the same trajectory. Currently we appear to be about 6-12 months behind the dot-com peak."},
      hottest: {t:"Hottest Risk Indicators", b:"<strong>The 5 most alarming signals right now.</strong> These are the individual indicators with the highest scores across all categories. They represent the areas where current conditions most closely match or exceed historical pre-crash levels. The mini chart shows each indicator's trend over time."},
      coolest: {t:"Coolest Indicators", b:"<strong>Where things look least bubbly.</strong> These 5 indicators have the lowest risk scores, meaning conditions in these areas are furthest from historical crisis levels. They represent potential counterarguments to the bubble thesis \u2014 areas where things are still relatively healthy."},
      weights: {t:"Scoring Weights", b:"<strong>How much each category matters.</strong> Not all risk categories are equally predictive. Financial Excess gets 25% weight because money flows have historically been the most reliable early warning. Reality Gap gets 23% because ROI disappointment is what ultimately pops bubbles. The pie chart shows these weights, and each box shows: the category score, its weight, and how many points it contributes to the final number."},
    };

    // Build overview with tooltips
    H+=`<div class="grid-3">`;

    // Gauge card
    H+=`<div class="card gauge-card has-tip" style="box-shadow:0 0 40px ${cs>=70?"rgba(255,71,87,0.12)":"rgba(255,165,2,0.12)"}" ${tip(TIPS.gauge.t,TIPS.gauge.b)}>`;
    H+=`<div class="gauge-label">COMPOSITE RISK SCORE</div>`;
    H+=`<div class="gauge-wrap">${gaugeSVG(cs)}<div class="gauge-center">`;
    H+=`<div class="gauge-score" style="color:${cc};text-shadow:0 0 20px ${cc}40">${cs}</div>`;
    H+=`<div class="gauge-risk" style="color:${cc}">${riskLabel(cs)}</div>`;
    H+=`<div class="gauge-max">/ 100</div></div></div>`;
    H+=`<div class="gauge-note" style="background:${cc}15;border:1px solid ${cc}30;color:${cc}">${cs>=70?"Warning zone \u2014 scores above 70 historically precede corrections within 6-18 months":"Elevated \u2014 multiple indicators flashing"}</div></div>`;

    // Category breakdown - HTML bars with individual tooltips
    H+=`<div class="card has-tip" ${tip(TIPS.catBreak.t,TIPS.catBreak.b)}>`;
    H+=`<div class="card-title">Category Breakdown</div><div class="card-sub">Risk score by category (0-100 scale)</div>`;
    const barTips = {
      "Behavioral Froth": "Tracks hype signals: Google search trends for AI investing, how many companies mention AI in earnings calls, LinkedIn title inflation, .ai domain speculation, and conference mania. Score of 77 means we're at 77% of dot-com-peak hype levels.",
      "Financial Excess": "Follows the money: VC concentration in AI, startup valuation multiples, circular financing between AI companies, insider selling by execs, off-balance-sheet debt, and AI ETF proliferation.",
      "Infrastructure Strain": "Physical reality check: power grid capacity vs. AI demand, capital spending vs. actual AI revenue, GPU rental price trends, and semiconductor supply chain fragility.",
      "Reality Gap": "The most important category. Measures: what % of enterprises see zero ROI from AI (95%), the productivity paradox, startup survival rates, how many AI pilots are stuck, and whether AI is accurate enough for real work.",

    };
    H+=`<div style="display:flex;flex-direction:column;gap:10px;padding:8px 0">`;
    catScores.forEach(c=>{
      H+=`<div style="display:flex;align-items:center;gap:12px;cursor:help" ${tip(c.name + " (" + c.score + "/100)", barTips[c.name] || c.name)}>`;
      H+=`<div style="width:120px;text-align:right;font-size:11px;color:var(--text-muted);flex-shrink:0">${c.name}</div>`;
      H+=`<div style="flex:1;height:20px;background:var(--border);border-radius:4px;overflow:hidden;position:relative">`;
      H+=`<div style="width:${c.score}%;height:100%;background:${c.color};border-radius:4px;opacity:0.8;transition:width 0.6s ease"></div></div>`;
      H+=`<div style="width:28px;font-size:12px;font-weight:700;color:var(--text-muted);font-family:monospace">${c.score}</div>`;
      H+=`</div>`;
    });
    H+=`</div></div>`;

    // Timeline
    H+=`<div class="card has-tip" ${tip(TIPS.timeline.t,TIPS.timeline.b)}>`;
    H+=`<div class="card-title">Risk Score Over Time</div><div class="card-sub">Composite score trajectory since Jan 2024</div>${areaSVG(HIST,"p","s",cc)}</div></div>`;

    // Dot-com + Rankings row
    H+=`<div class="grid-2">`;

    // Dot-com overlay
    H+=`<div class="card has-tip" ${tip(TIPS.dotcom.t,TIPS.dotcom.b)}>`;
    H+=`<div style="display:flex;align-items:center;gap:8;margin-bottom:4"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffa502" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg><span class="card-title" style="margin:0">Dot-Com Bubble Overlay</span></div>`;

    H+=`<div class="callout" style="background:#ffa50210;border:1px solid #ffa50220;color:#ffa502">The AI bubble currently tracks 6-12 months behind the dot-com peak. If the pattern holds, peak risk arrives late 2026 to mid-2027.</div></div>`;

    H+=`<div class="flex-col-gap">`;

    // Coolest

    H+=`<div style="display:flex;align-items:center;gap:8;margin-bottom:16"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2ed573" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg><span class="card-title" style="margin:0">Coolest Indicators</span></div>`;

    H+=`</div></div></div>`;

    // Weight distribution

    H+=`<div class="card-title">Scoring Weight Distribution</div><div class="card-sub">How each category contributes to the final composite score</div>`;

    // Weight boxes with individual tooltips

      "Financial Excess": "Follows the money: Are VCs pouring everything into AI? Are companies investing in each other in circles? Are insiders quietly selling shares? This category has the highest weight because money flows are the most reliable bubble signal.",

      "Reality Gap": "The most important question: Is AI actually delivering results? Right now 95% of enterprises report zero ROI from AI. This gap between promise and reality is what ultimately pops bubbles.",

    H+=`<div class="weight-grid">${catScores.map(c=>{

    }).join("")}</div></div></div>`;
  }

  if(activeTab==="indicators"){
    H+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16"><div style="font-size:12px;color:var(--text-muted)">Click a category to expand. Click any indicator to see: raw data, scoring formula, thresholds, and dot-com parallel.</div><button class="expand-btn" onclick="toggleAll()">${expandedCats.size===CATEGORIES.length?"Collapse All":"Expand All"}</button></div>`;

    CATEGORIES.forEach(cat=>{
      const avg=catAvg(cat), isExp=expandedCats.has(cat.id);
      H+=`<div class="cat-card"><div class="cat-header" onclick="toggleCat('${cat.id}')"><div class="cat-left"><div class="cat-icon" style="background:${cat.color}18;color:${cat.color}">${cat.icon}</div><div><div><span class="cat-name">${cat.name}</span><span class="cat-weight">Weight: ${Math.round(cat.weight*100)}%</span></div><div class="cat-desc">${cat.description}</div></div></div><div style="display:flex;align-items:center;gap:16"><div><div class="cat-score" style="color:${riskColor(avg)}">${avg}</div><div class="cat-score-label">AVG SCORE</div></div><span class="chev ${isExp?"open":""}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span></div></div>`;

      if(isExp){
        H+=`<div class="cat-body"><div class="cat-divider"></div>`;
